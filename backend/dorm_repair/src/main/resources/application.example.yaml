spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: dorm
  datasource:
    url: jdbc:mysql://localhost:3306/dormitory_repair?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password_here
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.qg.dorm.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  servlet:
    session:
      timeout: 30m

logging:
  level:
    com.qg.dorm.mapper: debug

aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    accessKeyId: your_access_key_id_here
    accessKeySecret: your_access_key_secret_here
    bucketName: your_bucket_name_here
    urlPrefix: https://your_bucket_name.oss-cn-beijing.aliyuncs.com/
